<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Bajaru Delivery…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #c8f135;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #7db800;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #e53935; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚴</div>
    <h2 id="title">Opening Bajaru Delivery…</h2>
    <p id="message">Please wait while we sign you in.</p>
    <div class="spinner" id="spinner"></div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');

      if (!token) {
        document.getElementById('title').textContent = 'Invalid Link';
        document.getElementById('message').innerHTML =
          '<span class="error">This login link is missing a token.<br>Ask your admin for a new link.</span>';
        document.getElementById('spinner').style.display = 'none';
        return;
      }

      var appUrl = 'bajaru-rider://login?token=' + encodeURIComponent(token);

      // Redirect immediately — Android intercepts the custom scheme and opens the app.
      window.location.replace(appUrl);

      // Fallback message shown if the app is not installed or the redirect takes too long.
      setTimeout(function () {
        document.getElementById('title').textContent = 'App Not Opened?';
        document.getElementById('message').textContent =
          'Make sure the Bajaru Delivery app is installed on your device, then tap the link again.';
        document.getElementById('spinner').style.display = 'none';
      }, 2500);
    })();
  </script>
</body>
</html>
